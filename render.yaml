services:
  - type: web
    name: semcds
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet --workers 1 --timeout 120 --bind 0.0.0.0:$PORT main:app
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: HOST
        value: 0.0.0.0
      - key: SOCKETIO_ASYNC_MODE
        value: eventlet
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: EMAIL_DELIVERY_PROVIDER
        value: auto
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_FROM_NAME
        value: SEMCDS
      - key: BREVO_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_USE_TLS
        value: "1"
      - key: SMTP_USE_SSL
        value: "0"
      - key: SMTP_REQUIRE_AUTH
        value: "1"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
